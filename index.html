<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121016" />
  <title>Vinted Manager · Hollywood Edition</title>
  <!-- VERSIUNE 3.0 HOLLYWOOD: interfață cinematică, navigare mobilă și flux simplificat -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --blue: #0b63f6;
      --blue-2: #2f80ff;
      --blue-soft: #eaf2ff;
      --blue-pale: #f4f8ff;
      --navy: #0d2145;
      --text: #17233c;
      --muted: #71809f;
      --line: #e3eaf7;
      --white: #ffffff;
      --success: #17a56b;
      --success-soft: #eafaf3;
      --danger: #e4495b;
      --danger-soft: #fff0f2;
      --warning: #f0a62b;
      --warning-soft: #fff7e8;
      --shadow: 0 16px 50px rgba(31, 83, 167, 0.12);
      --shadow-sm: 0 8px 26px rgba(31, 83, 167, 0.09);
      --radius: 22px;
      --radius-sm: 15px;
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; background: #eef5ff; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(73, 139, 255, .16), transparent 25%),
        linear-gradient(145deg, #f8fbff 0%, #eef5ff 55%, #f8fbff 100%);
      -webkit-tap-highlight-color: transparent;
    }

    button, input, select, textarea { font: inherit; }
    button, [role="button"] { touch-action: manipulation; -webkit-user-select: none; user-select: none; }
    .page { contain: layout style; }
    button { cursor: pointer; }
    img { display: block; max-width: 100%; }
    .hidden { display: none !important; }

    .icon { width: 21px; height: 21px; flex: 0 0 auto; }
    .icon-sm { width: 17px; height: 17px; }

    /* LOGIN */
    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-card {
      width: min(430px, 100%);
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 30px;
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: "";
      position: absolute;
      width: 210px;
      height: 210px;
      border-radius: 50%;
      right: -90px;
      top: -105px;
      background: linear-gradient(145deg, rgba(11,99,246,.22), rgba(66,151,255,.05));
    }

    .brand-mark {
      width: 58px;
      height: 58px;
      border-radius: 19px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(145deg, var(--blue), #56a1ff);
      box-shadow: 0 12px 28px rgba(11,99,246,.27);
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .brand-mark svg { width: 30px; height: 30px; }
    .login-card h1 { margin: 0; font-size: 28px; letter-spacing: -.7px; }
    .login-subtitle { color: var(--muted); margin: 8px 0 26px; line-height: 1.45; }

    .field { margin-bottom: 15px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 750;
      color: #465575;
      margin: 0 0 7px 4px;
    }

    .input-wrap { position: relative; }
    .input-wrap .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #8090af;
      pointer-events: none;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fbfdff;
      color: var(--text);
      border-radius: 14px;
      outline: none;
      transition: .18s ease;
    }
    input, select { height: 49px; padding: 0 14px; }
    .input-wrap input { padding-left: 43px; }
    textarea { min-height: 90px; resize: vertical; padding: 13px 14px; }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(11,99,246,.65);
      box-shadow: 0 0 0 4px rgba(11,99,246,.09);
      background: white;
    }

    .primary-btn, .secondary-btn, .danger-btn, .ghost-btn, .mini-btn {
      border: 0;
      border-radius: 14px;
      font-weight: 750;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }
    .primary-btn:active, .secondary-btn:active, .danger-btn:active, .ghost-btn:active, .mini-btn:active { transform: scale(.98); }
    .primary-btn {
      min-height: 50px;
      padding: 0 19px;
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--blue-2));
      box-shadow: 0 10px 24px rgba(11,99,246,.24);
    }
    .primary-btn.full { width: 100%; }
    .secondary-btn { min-height: 44px; padding: 0 16px; color: var(--blue); background: var(--blue-soft); }
    .danger-btn { min-height: 44px; padding: 0 16px; color: var(--danger); background: var(--danger-soft); }
    .ghost-btn { min-height: 42px; padding: 0 13px; color: #4c5d7d; background: transparent; border: 1px solid var(--line); }
    .mini-btn { min-height: 35px; padding: 0 12px; font-size: 12px; color: var(--blue); background: var(--blue-soft); }
    .mini-btn.success { color: var(--success); background: var(--success-soft); }
    .mini-btn.top { color: #9d6500; background: var(--warning-soft); }
    .mini-btn.remove { color: var(--danger); background: var(--danger-soft); }
    button:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }

    .login-note {
      margin-top: 18px;
      padding: 12px 13px;
      border-radius: 13px;
      background: var(--blue-pale);
      color: #5a6e94;
      font-size: 12px;
      line-height: 1.45;
      border: 1px solid #e4eeff;
    }

    .login-error { min-height: 20px; margin-top: 10px; color: var(--danger); font-size: 13px; text-align: center; }

    /* APP LAYOUT */
    .app-shell { min-height: 100vh; display: flex; }

    .sidebar {
      width: 270px;
      padding: 22px 17px 18px;
      background: rgba(255,255,255,.94);
      border-right: 1px solid rgba(220,230,247,.9);
      display: flex;
      flex-direction: column;
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 30;
      backdrop-filter: blur(18px);
    }

    .side-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 5px 8px 24px;
    }
    .side-brand .brand-mark { width: 44px; height: 44px; border-radius: 14px; margin: 0; }
    .side-brand .brand-mark svg { width: 24px; height: 24px; }
    .side-brand strong { display: block; font-size: 17px; }
    .side-brand span { font-size: 11px; color: var(--muted); }

    .nav-list { display: grid; gap: 6px; }
    .nav-item {
      border: 0;
      width: 100%;
      min-height: 48px;
      padding: 0 13px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #52617f;
      background: transparent;
      border-radius: 14px;
      font-weight: 700;
      text-align: left;
    }
    .nav-item:hover { background: #f5f8fe; }
    .nav-item.active {
      color: var(--blue);
      background: linear-gradient(90deg, #eaf2ff, #f4f8ff);
      box-shadow: inset 3px 0 0 var(--blue);
    }
    .nav-spacer { flex: 1; }
    .side-user {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 13px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #fbfdff;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 900;
    }
    .side-user strong { display: block; font-size: 13px; }
    .side-user span { display: block; color: var(--muted); font-size: 10px; max-width: 145px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .main {
      width: calc(100% - 270px);
      margin-left: 270px;
      min-height: 100vh;
      padding: 28px 32px 105px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 25px;
    }
    .topbar h1 { margin: 0; font-size: clamp(25px, 3vw, 34px); letter-spacing: -1px; }
    .topbar p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .top-actions { display: flex; align-items: center; gap: 10px; }
    .menu-btn { display: none; }

    .sync-pill {
      height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.78);
      border: 1px solid var(--line);
      color: #5b6d8d;
      font-size: 12px;
      font-weight: 700;
    }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warning); box-shadow: 0 0 0 4px rgba(240,166,43,.12); }
    .sync-pill.online .sync-dot { background: var(--success); box-shadow: 0 0 0 4px rgba(23,165,107,.12); }

    .page { display: none; animation: fadeIn .23s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

    .hero {
      border-radius: 27px;
      background:
        radial-gradient(circle at 86% 20%, rgba(255,255,255,.28), transparent 28%),
        linear-gradient(135deg, #0a5eea, #3488ff);
      color: white;
      min-height: 190px;
      padding: 27px;
      box-shadow: 0 18px 42px rgba(11,99,246,.22);
      display: grid;
      grid-template-columns: 1.4fr .8fr;
      gap: 20px;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    .hero::after {
      content: "";
      width: 270px;
      height: 270px;
      position: absolute;
      right: -130px;
      bottom: -170px;
      border-radius: 50%;
      border: 38px solid rgba(255,255,255,.09);
    }
    .hero-label { font-size: 13px; opacity: .83; font-weight: 700; }
    .hero-value { font-size: clamp(36px, 6vw, 55px); font-weight: 900; letter-spacing: -2px; margin: 6px 0 12px; }
    .hero-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .hero-chip { padding: 7px 10px; border-radius: 10px; background: rgba(255,255,255,.15); font-size: 11px; font-weight: 750; backdrop-filter: blur(10px); }
    .hero-side { z-index: 1; display: grid; gap: 10px; }
    .hero-side-card { background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.18); border-radius: 16px; padding: 13px 14px; backdrop-filter: blur(10px); }
    .hero-side-card span { display: block; font-size: 11px; opacity: .78; }
    .hero-side-card strong { display: block; font-size: 20px; margin-top: 3px; }


    .clickable-card {
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, filter .16s ease;
    }
    .clickable-card:hover { transform: translateY(-2px); filter: brightness(1.015); }
    .clickable-card:active { transform: scale(.985); }
    .metric-card.clickable-card:hover, .panel.clickable-card:hover { box-shadow: 0 15px 35px rgba(31,83,167,.16); border-color: #cbdcff; }
    .hero-click-area { position: relative; z-index: 2; border-radius: 18px; padding: 5px; margin: -5px; }
    .hero-click-area:focus-visible, .clickable-card:focus-visible, .mini-product:focus-visible { outline: 3px solid rgba(255,255,255,.72); outline-offset: 3px; }
    .metric-card:focus-visible, .mini-product:focus-visible { outline-color: rgba(11,99,246,.38); }
    .card-arrow { margin-left: auto; color: #9aabc8; transition: transform .16s ease; }
    .clickable-card:hover .card-arrow, .mini-product:hover .card-arrow { transform: translateX(3px); color: var(--blue); }
    .mini-product { cursor: pointer; transition: transform .15s ease, background .15s ease, border-color .15s ease; }
    .mini-product:hover { transform: translateX(3px); background: #fff; border-color: #cfddf5; }
    .mini-product:active { transform: scale(.99); }
    .product-card.focused-item {
      animation: focusPulse 1.7s ease;
      border-color: rgba(11,99,246,.75);
      box-shadow: 0 0 0 5px rgba(11,99,246,.12), 0 18px 45px rgba(31,83,167,.2);
    }
    @keyframes focusPulse {
      0%,100% { transform: translateY(0); }
      35% { transform: translateY(-5px); }
    }
    .monthly-overview {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 15px;
      margin-bottom: 17px;
    }
    .month-main-card, .month-side-card {
      background: rgba(255,255,255,.94);
      border: 1px solid var(--line);
      border-radius: 21px;
      box-shadow: var(--shadow-sm);
      padding: 19px;
    }
    .month-main-card { background: linear-gradient(135deg, #ffffff, #f3f8ff); }
    .month-label { color: var(--muted); font-size: 11px; font-weight: 750; text-transform: uppercase; letter-spacing: .45px; }
    .month-profit { font-size: 34px; font-weight: 900; letter-spacing: -1px; color: var(--success); margin: 7px 0 13px; }
    .month-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 9px; }
    .month-mini { padding: 11px; border-radius: 13px; background: #f7faff; }
    .month-mini span { display:block; color:var(--muted); font-size:9px; }
    .month-mini strong { display:block; margin-top:4px; font-size:13px; }
    .breakdown-list { display: grid; gap: 9px; }
    .breakdown-row {
      display: grid;
      grid-template-columns: 48px minmax(0,1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 9px;
      border: 1px solid var(--line);
      background: #f9fbff;
      border-radius: 14px;
      cursor: pointer;
    }
    .breakdown-row:hover { background: #fff; border-color: #cadbf7; }
    .breakdown-row .thumb { width: 48px; height: 48px; }
    .breakdown-row strong { display:block; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .breakdown-row span { display:block; color:var(--muted); font-size:9px; margin-top:3px; }
    .breakdown-price { font-size:13px !important; color:var(--text) !important; font-weight:850; margin:0 !important; white-space:nowrap; }
    .modal-total { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:15px; padding:14px; border-radius:14px; background:var(--blue-soft); color:var(--blue); }
    .weekly-products { margin-top: 13px; padding-top: 12px; border-top: 1px solid var(--line); display:grid; gap:7px; }
    .weekly-product-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:8px 10px; border-radius:11px; background:#f8fbff; cursor:pointer; }
    .weekly-product-row:hover { background:var(--blue-soft); }
    .weekly-product-row div { min-width:0; }
    .weekly-product-row strong { display:block; font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .weekly-product-row span { display:block; color:var(--muted); font-size:9px; margin-top:2px; }
    .weekly-product-row em { flex:0 0 auto; font-size:9px; font-style:normal; font-weight:800; color:var(--blue); background:var(--blue-soft); padding:5px 7px; border-radius:8px; }
    .swipe-hint { display:none; }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 18px 0;
    }
    .metric-card, .panel, .product-card, .weekly-card {
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(225,234,247,.95);
      box-shadow: var(--shadow-sm);
    }
    .metric-card { border-radius: 18px; padding: 17px; }
    .metric-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .metric-icon { width: 39px; height: 39px; border-radius: 13px; display: grid; place-items: center; color: var(--blue); background: var(--blue-soft); }
    .metric-card:nth-child(2) .metric-icon { color: var(--success); background: var(--success-soft); }
    .metric-card:nth-child(3) .metric-icon { color: #835ac7; background: #f3edff; }
    .metric-card:nth-child(4) .metric-icon { color: #ac6d00; background: var(--warning-soft); }
    .metric-card span { color: var(--muted); font-size: 11px; font-weight: 700; }
    .metric-card strong { display: block; font-size: 22px; margin-top: 12px; letter-spacing: -.4px; }

    .dashboard-grid { display: grid; grid-template-columns: 1.15fr .85fr; gap: 18px; }
    .panel { border-radius: var(--radius); padding: 20px; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 17px; }
    .panel-head h2 { margin: 0; font-size: 17px; letter-spacing: -.3px; }
    .panel-head p { margin: 4px 0 0; color: var(--muted); font-size: 11px; }

    .list-stack { display: grid; gap: 10px; }
    .mini-product {
      display: grid;
      grid-template-columns: 55px minmax(0, 1fr) auto;
      gap: 11px;
      align-items: center;
      padding: 9px;
      border-radius: 14px;
      background: #f9fbff;
      border: 1px solid #edf2fa;
    }
    .thumb { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; background: #eaf2ff; }
    .thumb-placeholder { display: grid; place-items: center; color: var(--blue); }
    .mini-product strong { font-size: 13px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mini-product span { display: block; color: var(--muted); font-size: 10px; margin-top: 4px; }
    .price { font-weight: 850; font-size: 13px; white-space: nowrap; }

    .week-summary { display: grid; gap: 13px; }
    .week-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding-bottom: 11px; border-bottom: 1px solid var(--line); }
    .week-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .week-row span { color: var(--muted); font-size: 12px; }
    .week-row strong { font-size: 14px; }
    .positive { color: var(--success) !important; }
    .negative { color: var(--danger) !important; }

    .section-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .search-box { max-width: 360px; flex: 1; }
    .empty-state {
      text-align: center;
      padding: 48px 18px;
      background: rgba(255,255,255,.85);
      border: 1px dashed #cad9f2;
      border-radius: 22px;
      color: var(--muted);
    }
    .empty-icon { width: 58px; height: 58px; border-radius: 18px; display: grid; place-items: center; background: var(--blue-soft); color: var(--blue); margin: 0 auto 14px; }
    .empty-state h3 { margin: 0 0 7px; color: var(--text); }
    .empty-state p { margin: 0; font-size: 13px; }

    .products-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .product-card { border-radius: 20px; overflow: hidden; min-width: 0; }
    .product-image { aspect-ratio: 1.35 / 1; width: 100%; object-fit: cover; background: linear-gradient(145deg, #eaf2ff, #f8fbff); }
    .product-image-placeholder { aspect-ratio: 1.35 / 1; display: grid; place-items: center; color: var(--blue); background: linear-gradient(145deg, #eaf2ff, #f8fbff); }
    .product-body { padding: 15px; }
    .product-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .product-title { margin: 0; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge { flex: 0 0 auto; padding: 5px 8px; font-size: 9px; font-weight: 850; text-transform: uppercase; letter-spacing: .4px; border-radius: 8px; color: var(--blue); background: var(--blue-soft); }
    .badge.sold { color: var(--success); background: var(--success-soft); }
    .badge.top { color: #9d6500; background: var(--warning-soft); }
    .product-date { color: var(--muted); font-size: 10px; margin: 6px 0 13px; }
    .price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 13px; }
    .price-box { padding: 9px 8px; border-radius: 11px; background: #f7faff; min-width: 0; }
    .price-box span { display: block; color: var(--muted); font-size: 8px; text-transform: uppercase; letter-spacing: .3px; }
    .price-box strong { display: block; margin-top: 3px; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .price-box.profit { background: var(--success-soft); }
    .price-box.profit strong { color: var(--success); }
    .product-actions { display: flex; flex-wrap: wrap; gap: 7px; }

    .top-card { position: relative; }
    .top-card::before {
      content: "TOP";
      position: absolute;
      top: 11px;
      left: 11px;
      z-index: 2;
      color: #8a5900;
      background: rgba(255,247,232,.94);
      border: 1px solid rgba(240,166,43,.25);
      padding: 6px 9px;
      border-radius: 9px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .6px;
      backdrop-filter: blur(8px);
    }

    .stats-head-card {
      background: linear-gradient(135deg, #0b63f6, #4b96ff);
      color: white;
      border-radius: 22px;
      padding: 21px;
      margin-bottom: 17px;
      box-shadow: 0 15px 35px rgba(11,99,246,.2);
    }
    .stats-head-card h2 { margin: 0; font-size: 18px; }
    .stats-head-card p { margin: 7px 0 0; font-size: 12px; opacity: .8; }
    .weekly-list { display: grid; gap: 14px; }
    .weekly-card { border-radius: 20px; padding: 18px; }
    .weekly-title { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .weekly-title h3 { margin: 0; font-size: 15px; }
    .weekly-title p { margin: 5px 0 0; color: var(--muted); font-size: 10px; }
    .weekly-stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 9px; }
    .weekly-stat { border-radius: 12px; background: #f7faff; padding: 11px; }
    .weekly-stat span { display: block; color: var(--muted); font-size: 9px; }
    .weekly-stat strong { display: block; font-size: 14px; margin-top: 4px; }
    .profit-bar { height: 8px; border-radius: 99px; background: #edf2fb; overflow: hidden; margin-top: 14px; }
    .profit-bar span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--blue), #60a6ff); }

    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 17px; }
    .setting-card { background: rgba(255,255,255,.9); border: 1px solid var(--line); border-radius: 20px; padding: 20px; box-shadow: var(--shadow-sm); }
    .setting-card h3 { margin: 0 0 5px; font-size: 16px; }
    .setting-card > p { margin: 0 0 17px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .setting-line { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--line); }
    .setting-line:last-child { border-bottom: 0; }
    .setting-line span { color: var(--muted); font-size: 12px; }
    .setting-line strong { font-size: 12px; text-align: right; word-break: break-word; }

    .fab {
      position: fixed;
      right: 29px;
      bottom: 28px;
      width: 62px;
      height: 62px;
      border-radius: 20px;
      border: 0;
      color: white;
      background: linear-gradient(145deg, var(--blue), #50a0ff);
      box-shadow: 0 14px 35px rgba(11,99,246,.35);
      display: grid;
      place-items: center;
      z-index: 25;
    }
    .fab svg { width: 27px; height: 27px; }
    .fab:active { transform: scale(.96); }

    /* MODALS */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(9,28,59,.52);
      backdrop-filter: blur(8px);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .modal {
      width: min(560px, 100%);
      max-height: min(90vh, 820px);
      overflow-y: auto;
      background: white;
      border-radius: 25px;
      box-shadow: 0 25px 80px rgba(0,25,75,.28);
      padding: 23px;
    }
    .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 15px; margin-bottom: 20px; }
    .modal-head h2 { margin: 0; font-size: 20px; letter-spacing: -.4px; }
    .close-btn { width: 39px; height: 39px; border-radius: 12px; border: 0; color: #657594; background: #f2f6fc; display: grid; place-items: center; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
    .form-grid .full-span { grid-column: 1 / -1; }
    .image-picker { border: 1px dashed #b9cae8; border-radius: 16px; background: #f8fbff; min-height: 135px; display: grid; place-items: center; overflow: hidden; position: relative; color: #6680aa; text-align: center; padding: 16px; }
    .image-picker input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .image-picker img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .image-picker-content { position: relative; z-index: 1; }
    .image-picker.has-image .image-picker-content { display: none; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 9px; margin-top: 20px; }

    .toast-wrap { position: fixed; right: 22px; top: 20px; z-index: 120; display: grid; gap: 8px; }
    .toast { min-width: min(340px, calc(100vw - 36px)); max-width: 420px; padding: 13px 15px; border-radius: 14px; background: #13284b; color: white; box-shadow: 0 14px 40px rgba(0,23,68,.28); font-size: 13px; animation: toastIn .25s ease; }
    .toast.error { background: #b92d40; }
    .toast.success { background: #137f55; }
    @keyframes toastIn { from { transform: translateY(-8px); opacity: 0; } }

    .drawer-overlay { display: none; }

    @media (max-width: 1100px) {
      .metric-grid { grid-template-columns: repeat(2, 1fr); }
      .products-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .weekly-stats { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 850px) {
      .sidebar { transform: translateX(-105%); transition: transform .23s ease; box-shadow: 18px 0 60px rgba(15,48,100,.2); }
      .sidebar.open { transform: translateX(0); }
      .drawer-overlay { display: block; position: fixed; inset: 0; z-index: 29; background: rgba(4,24,58,.4); backdrop-filter: blur(3px); }
      .main { width: 100%; margin-left: 0; padding: 21px 18px 100px; }
      .menu-btn { display: grid; width: 42px; height: 42px; place-items: center; border-radius: 13px; border: 1px solid var(--line); background: rgba(255,255,255,.86); color: var(--blue); }
      .topbar { align-items: flex-start; }
      .top-actions { flex-direction: row-reverse; }
      .dashboard-grid, .settings-grid { grid-template-columns: 1fr; }
      .monthly-overview { grid-template-columns: 1fr; }
      .swipe-hint { display:block; position:fixed; left:0; top:35%; width:3px; height:84px; border-radius:0 5px 5px 0; background:rgba(11,99,246,.2); pointer-events:none; z-index:20; }
      .fab { right: 19px; bottom: 20px; }
    }

    @media (max-width: 600px) {
      .login-shell { padding: 14px; }
      .login-card { padding: 24px 19px; border-radius: 24px; }
      .main { padding: 17px 13px 94px; }
      .topbar { margin-bottom: 18px; }
      .topbar h1 { font-size: 25px; }
      .topbar p { max-width: 210px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .sync-pill span { display: none; }
      .sync-pill { width: 38px; padding: 0; justify-content: center; }
      .hero { grid-template-columns: 1fr; padding: 21px; min-height: 220px; }
      .hero-value { font-size: 41px; }
      .hero-side { grid-template-columns: 1fr 1fr; }
      .hero-side-card { padding: 11px; }
      .hero-side-card strong { font-size: 17px; }
      .metric-grid { grid-template-columns: repeat(2, 1fr); gap: 9px; margin: 12px 0; }
      .metric-card { padding: 13px; }
      .metric-card strong { font-size: 18px; }
      .products-grid { grid-template-columns: 1fr; gap: 12px; }
      .product-card { display: grid; grid-template-columns: 112px minmax(0,1fr); }
      .product-image, .product-image-placeholder { width: 112px; height: 100%; min-height: 178px; aspect-ratio: auto; }
      .product-body { padding: 13px; }
      .price-grid { gap: 5px; }
      .price-box { padding: 8px 6px; }
      .weekly-stats { grid-template-columns: repeat(2, 1fr); }
      .month-grid { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full-span { grid-column: auto; }
      .modal { padding: 19px 15px; border-radius: 21px; }
      .modal-actions { flex-direction: column-reverse; }
      .modal-actions button { width: 100%; }
      .section-tools { align-items: stretch; flex-direction: column; }
      .search-box { max-width: none; }
      .fab { width: 58px; height: 58px; border-radius: 18px; }
    }


    /* ============================================================
       HOLLYWOOD EDITION 3.0 — REDESIGN COMPLET
       ============================================================ */
    :root {
      --blue: #cfa84f;
      --blue-2: #f1d17f;
      --blue-soft: #fbf2dc;
      --blue-pale: #f7f3ea;
      --navy: #121016;
      --text: #1b1820;
      --muted: #77717d;
      --line: rgba(28, 23, 32, .11);
      --white: #ffffff;
      --success: #15865f;
      --success-soft: #e9f7f1;
      --danger: #c94e5d;
      --danger-soft: #fff0f2;
      --warning: #b77a1d;
      --warning-soft: #fff5de;
      --gold: #cfa84f;
      --gold-light: #f4d88f;
      --ink: #121016;
      --ink-soft: #201c26;
      --cream: #f5f0e7;
      --shadow: 0 24px 70px rgba(27, 20, 31, .12);
      --shadow-sm: 0 12px 35px rgba(27, 20, 31, .08);
      --radius: 26px;
      --radius-sm: 16px;
    }

    html { background: var(--cream); }
    body {
      background:
        radial-gradient(circle at 5% 0%, rgba(207,168,79,.16), transparent 26%),
        radial-gradient(circle at 95% 8%, rgba(99,64,104,.10), transparent 24%),
        linear-gradient(145deg, #fbf8f2 0%, #f3eee5 52%, #f8f4ed 100%);
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .14;
      background-image: radial-gradient(rgba(18,16,22,.2) .55px, transparent .55px);
      background-size: 7px 7px;
      z-index: -1;
    }

    .login-shell {
      background:
        radial-gradient(circle at 50% 10%, rgba(241,209,127,.20), transparent 25%),
        linear-gradient(145deg, #0b0a0d 0%, #17131b 56%, #0c0a0e 100%);
    }
    .login-card {
      background: rgba(250,247,240,.97);
      border: 1px solid rgba(244,216,143,.26);
      box-shadow: 0 35px 100px rgba(0,0,0,.45);
      border-radius: 32px;
      padding: 34px;
    }
    .login-card::before {
      height: 5px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
    }
    .brand-mark {
      color: #17131b;
      background: linear-gradient(145deg, #f6de9f, #c99e42);
      box-shadow: 0 15px 34px rgba(176,126,32,.24);
      border-radius: 17px;
    }
    .login-card h1,
    .side-brand strong,
    .topbar h1,
    .cinema-copy h2 {
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
    }
    .login-card h1 { font-size: 31px; color: var(--ink); }
    .login-subtitle { color: #716a75; }
    .login-note { background: #f2eadb; border-color: rgba(207,168,79,.35); color: #63552f; }

    input, select, textarea {
      background: #fffdfa;
      border-color: rgba(28,23,32,.13);
      min-height: 50px;
      border-radius: 14px;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(207,168,79,.15);
    }

    .primary-btn {
      color: #17120a;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      box-shadow: 0 12px 28px rgba(166,118,29,.22);
    }
    .secondary-btn { color: #6d5220; background: #f9efd9; }
    .ghost-btn { color: #4d4751; border-color: rgba(28,23,32,.14); background: #fffdfa; }
    .mini-btn { color: #6f531c; background: #f9efd9; }
    .mini-btn.success { color: #fff; background: #168961; }
    .mini-btn.top { color: #392b0e; background: linear-gradient(135deg,#f8dfa0,#d5a94c); }

    .sidebar {
      width: 292px;
      padding: 25px 20px 20px;
      color: #f8f0df;
      background:
        radial-gradient(circle at 25% 0%, rgba(239,203,112,.14), transparent 30%),
        linear-gradient(180deg, #151219 0%, #0d0c10 100%);
      border-right: 1px solid rgba(241,209,127,.14);
      box-shadow: 20px 0 70px rgba(18,16,22,.08);
    }
    .side-brand { padding: 7px 6px 25px; border-bottom: 1px solid rgba(255,255,255,.08); margin-bottom: 20px; }
    .side-brand .brand-mark { box-shadow: none; }
    .side-brand strong { color: #fff7e9; font-size: 18px; letter-spacing: -.2px; }
    .side-brand span { color: rgba(255,255,255,.45); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .nav-list { gap: 8px; }
    .nav-item {
      color: rgba(255,255,255,.62);
      border-radius: 15px;
      min-height: 52px;
      font-weight: 760;
      border: 1px solid transparent;
    }
    .nav-item:hover { color: white; background: rgba(255,255,255,.06); }
    .nav-item.active {
      color: #1b150a;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      box-shadow: 0 12px 30px rgba(176,126,32,.20);
      border-color: rgba(255,255,255,.12);
    }
    .side-user {
      background: rgba(255,255,255,.055);
      border-color: rgba(255,255,255,.08);
      color: white;
    }
    .side-user span { color: rgba(255,255,255,.42); }
    .avatar { color: #21170a; background: linear-gradient(145deg, #f6df9f, #c89d42); }

    .main {
      margin-left: 292px;
      width: calc(100% - 292px);
      padding: 30px clamp(22px, 4vw, 58px) 110px;
      max-width: 1780px;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 24;
      margin: -10px -12px 27px;
      padding: 14px 12px 17px;
      background: rgba(247,243,235,.82);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(28,23,32,.06);
    }
    .topbar h1 { color: var(--ink); font-size: clamp(27px,3vw,38px); }
    .topbar p { color: var(--muted); font-size: 12px; }
    .sync-pill {
      background: rgba(255,255,255,.78);
      color: #4d4751;
      border-color: rgba(28,23,32,.10);
      box-shadow: 0 8px 24px rgba(27,20,31,.06);
    }

    .cinema-hero {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0,1.35fr) minmax(290px,.65fr);
      gap: 28px;
      padding: clamp(25px,4vw,48px);
      border-radius: 34px;
      color: white;
      background:
        radial-gradient(circle at 88% 15%, rgba(245,216,143,.25), transparent 22%),
        radial-gradient(circle at 12% 100%, rgba(117,67,102,.23), transparent 34%),
        linear-gradient(145deg, #16131a 0%, #25202b 55%, #0e0c11 100%);
      box-shadow: 0 32px 75px rgba(18,16,22,.24);
      border: 1px solid rgba(244,216,143,.16);
    }
    .cinema-hero::after {
      content: '';
      position: absolute;
      right: -110px;
      bottom: -130px;
      width: 330px;
      height: 330px;
      border-radius: 50%;
      border: 1px solid rgba(244,216,143,.17);
      box-shadow: 0 0 0 40px rgba(244,216,143,.035), 0 0 0 80px rgba(244,216,143,.025);
    }
    .cinema-copy, .cinema-summary { position: relative; z-index: 2; }
    .cinema-kicker, .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--gold-light);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }
    .cinema-kicker::before, .section-kicker::before { content:''; width: 24px; height: 1px; background: currentColor; }
    .cinema-copy h2 { margin: 15px 0 8px; font-size: clamp(30px,4.6vw,54px); line-height: .98; letter-spacing: -1.7px; max-width: 720px; }
    .cinema-copy > p { margin: 0 0 25px; max-width: 590px; color: rgba(255,255,255,.60); font-size: 13px; line-height: 1.65; }
    .hero-profit-card {
      width: min(520px,100%);
      display: grid;
      text-align: left;
      padding: 18px 20px;
      border: 1px solid rgba(244,216,143,.20);
      border-radius: 20px;
      color: white;
      background: rgba(255,255,255,.075);
      backdrop-filter: blur(12px);
      transition: .18s ease;
    }
    .hero-profit-card:hover { transform: translateY(-2px); background: rgba(255,255,255,.10); }
    .hero-profit-card small { color: rgba(255,255,255,.55); font-weight: 750; }
    .hero-profit-card strong { margin: 3px 0; font-size: clamp(35px,5vw,54px); letter-spacing: -2px; color: #f5d98f; }
    .hero-profit-card span { color: rgba(255,255,255,.50); font-size: 10px; }
    .hero-buttons { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
    .hero-buttons .primary-btn { min-height: 48px; }
    .ghost-light {
      min-height: 48px;
      padding: 0 17px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 14px;
      color: white;
      background: rgba(255,255,255,.055);
      font-weight: 800;
    }
    .cinema-summary {
      display: grid;
      align-content: center;
      gap: 11px;
    }
    .spotlight-card {
      padding: 16px 17px;
      border-radius: 18px;
      background: rgba(255,255,255,.075);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: .16s ease;
    }
    .spotlight-card:hover { transform: translateX(-3px); background: rgba(255,255,255,.105); }
    .spotlight-card span { display:block; color:rgba(255,255,255,.50); font-size:10px; }
    .spotlight-card strong { display:block; margin-top:5px; font-size:19px; }
    .spotlight-card em { display:block; margin-top:3px; color:var(--gold-light); font-size:9px; font-style:normal; font-weight:800; }

    .simple-flow {
      margin: 18px 0;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
      background: rgba(255,255,255,.68);
      border: 1px solid rgba(28,23,32,.08);
      border-radius: 22px;
      box-shadow: var(--shadow-sm);
    }
    .flow-step { display:flex; align-items:center; gap:11px; padding:10px; min-width:0; }
    .flow-number {
      width:36px; height:36px; border-radius:13px; display:grid; place-items:center; flex:0 0 auto;
      color:#1d160a; background:linear-gradient(145deg,#f5d98f,#cda54d); font-weight:950;
    }
    .flow-step strong { display:block; font-size:12px; }
    .flow-step span { display:block; margin-top:2px; color:var(--muted); font-size:9px; line-height:1.35; }

    .quick-grid {
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
      margin: 18px 0;
    }
    .quick-card {
      position:relative;
      overflow:hidden;
      min-height:148px;
      padding:19px;
      border-radius:22px;
      background:rgba(255,255,255,.88);
      border:1px solid rgba(28,23,32,.08);
      box-shadow:var(--shadow-sm);
      cursor:pointer;
      transition:transform .18s ease,box-shadow .18s ease;
    }
    .quick-card:hover { transform:translateY(-4px); box-shadow:0 20px 50px rgba(27,20,31,.13); }
    .quick-card.dark { color:white; background:linear-gradient(145deg,#1b1720,#0f0d12); }
    .quick-card.gold { color:#211808; background:linear-gradient(145deg,#f5dfa4,#cfaa55); }
    .quick-card.plum { color:white; background:linear-gradient(145deg,#5b354e,#2e1d2a); }
    .quick-icon { width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:rgba(207,168,79,.15);color:#9d7422; }
    .quick-card.dark .quick-icon,.quick-card.plum .quick-icon { color:var(--gold-light);background:rgba(255,255,255,.09); }
    .quick-card.gold .quick-icon { background:rgba(40,27,7,.10);color:#3a280b; }
    .quick-value { display:block;margin-top:17px;font-size:25px;font-weight:950;letter-spacing:-.7px; }
    .quick-title { display:block;margin-top:3px;font-size:12px;font-weight:850; }
    .quick-description { display:block;margin-top:4px;color:var(--muted);font-size:9px;line-height:1.45; }
    .quick-card.dark .quick-description,.quick-card.plum .quick-description { color:rgba(255,255,255,.47); }
    .quick-card.gold .quick-description { color:rgba(35,24,6,.60); }

    .dashboard-grid { grid-template-columns: 1.15fr .85fr; gap: 18px; }
    .panel, .metric-card, .product-card, .weekly-card, .setting-card, .month-main-card, .month-side-card {
      background: rgba(255,255,255,.88);
      border-color: rgba(28,23,32,.08);
      box-shadow: var(--shadow-sm);
    }
    .panel { border-radius: 25px; padding: 22px; }
    .panel-head h2 { font-size:18px; }
    .panel-head p { font-size:10px; }
    .mini-product {
      background:#fbf8f2;
      border-color:rgba(28,23,32,.07);
      border-radius:16px;
      padding:10px;
    }
    .mini-product:hover { background:#fff; border-color:rgba(207,168,79,.5); }
    .thumb { border-radius:14px; background:#f0e7d7; }
    .thumb-placeholder { color:#9d7422; }
    .week-row { border-color:rgba(28,23,32,.08); }

    .section-intro {
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:18px;
      padding:24px;
      margin-bottom:15px;
      border-radius:25px;
      color:white;
      background:linear-gradient(145deg,#1b1720,#0f0d12);
      border:1px solid rgba(244,216,143,.13);
      box-shadow:0 20px 50px rgba(18,16,22,.18);
    }
    .section-intro h2 { margin:9px 0 4px;font-family:ui-serif,Georgia,serif;font-size:27px;letter-spacing:-.7px; }
    .section-intro p { margin:0;color:rgba(255,255,255,.52);font-size:11px;line-height:1.55; }
    .count-bubble { min-width:68px;height:68px;border-radius:21px;display:grid;place-items:center;color:#211708;background:linear-gradient(145deg,#f5da93,#cda34a);font-size:24px;font-weight:950; }
    .section-tools { padding: 0 2px; }
    .search-box input { background:rgba(255,255,255,.82); }

    .product-card { border-radius:24px; }
    .product-image, .product-image-placeholder { background:linear-gradient(145deg,#ede3d2,#faf6ee); }
    .product-image-placeholder { color:#9d7422; }
    .product-body { padding:17px; }
    .product-title { font-size:16px; }
    .badge { color:#735718;background:#f8ecd1;border-radius:99px; }
    .badge.sold { color:#116947;background:#e6f4ee; }
    .badge.top { color:#261b08;background:linear-gradient(135deg,#f7dda0,#d1a74c); }

  <script>
    /* ===============================================================
       CONFIGURARE SUPABASE
       Înlocuiește valorile de mai jos cu Project URL și anon key.
       Dacă rămân necompletate, aplicația funcționează în modul demo/local.
       =============================================================== */
    const SUPABASE_URL = 'https://aiyhaviftcfrbiflukwi.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_fJfcojko5joGshn6MJBVvA_fD6pLNJC';
    const FIXED_EMAIL = 'ionut7628c@gmail.com';
    const DEMO_PIN_HASH = 'b968e8bbbac5318680e60cee33b2cad83d75ea30b4005ac8903c7d3c66895146';
    const supabasePasswordFromPin = pin => `VintedManager-${pin}-Secure`;

    const ICON_PRODUCT = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12l3 4v14H3V7z"/><path d="M3 7h18M9 11h6"/></svg>`;
    const ICON_EMPTY = `<svg width="29" height="29" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12l3 4v14H3V7z"/><path d="M3 7h18M9 11h6"/></svg>`;

    const CONFIGURED = SUPABASE_URL.startsWith('https://') && !SUPABASE_URL.includes('YOUR_') && !SUPABASE_ANON_KEY.includes('YOUR_');
    const db = CONFIGURED ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    }) : null;

    const state = {
      user: null,
      items: [],
      page: 'home',
      search: '',
      editingImage: '',
      demo: !CONFIGURED,
      busy: false,
      focusItemId: null,
      pageHistory: ['home'],
      swipeStart: null
    };

    const pageInfo = {
      home: ['Acasă', 'Tot ce trebuie să știi despre produsele și banii tăi.'],
      published: ['Publicate', 'Produsele care sunt acum la vânzare.'],
      sold: ['Vândute', 'Aici vezi cât ai încasat și cât ai câștigat.'],
      top: ['Produse TOP', 'Produsele pe care vrei să le urmărești separat.'],
      statistics: ['Statistici', 'Rezultatele tale, organizate pe săptămâni.'],
      settings: ['Setări', 'Contul, sincronizarea și datele aplicației.']
    };

    const money = value => `${Number(value || 0).toLocaleString('ro-RO', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} lei`;
    const escapeHtml = value => String(value ?? '').replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    const uid = () => (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`);
    const nowIso = () => new Date().toISOString();

    async function sha256(value) {
      const bytes = new TextEncoder().encode(value);
      const digest = await crypto.subtle.digest('SHA-256', bytes);
      return [...new Uint8Array(digest)].map(byte => byte.toString(16).padStart(2, '0')).join('');
    }
    const fmtDateTime = value => new Intl.DateTimeFormat('ro-RO', { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(value));
    const fmtDate = value => new Intl.DateTimeFormat('ro-RO', { day: '2-digit', month: 'short', year: 'numeric' }).format(new Date(value));

    function toast(message, type = '') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = message;
      document.getElementById('toastWrap').appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }

    function setLoginMessage(message, error = false) {
      const el = document.getElementById('loginError');
      el.textContent = message || '';
      el.style.color = error ? 'var(--danger)' : 'var(--success)';
    }

    function setBusy(busy) {
      state.busy = busy;
      document.querySelectorAll('button[type="submit"]').forEach(btn => btn.disabled = busy);
      const loginBtn = document.getElementById('loginBtn');
      if (loginBtn) loginBtn.textContent = busy ? 'Se conectează...' : 'Conectare';
    }

    function localKey() { return `vinted-manager-items-${FIXED_EMAIL}`; }
    function sessionKey() { return `vinted-manager-session-${FIXED_EMAIL}`; }

    function sampleItems() {
      const d = new Date();
      const ago = days => new Date(d.getTime() - days * 86400000).toISOString();
      return [
        { id: uid(), title: 'Brățară placată cu aur', purchase_price: 19.90, asking_price: 59.99, sold_price: null, status: 'published', image_url: '', is_top: false, created_at: ago(2), sold_at: null },
        { id: uid(), title: 'Inel argint 925', purchase_price: 28, asking_price: 74.99, sold_price: 65, status: 'sold', image_url: '', is_top: true, created_at: ago(11), sold_at: ago(4) },
        { id: uid(), title: 'Colier cu pandantiv', purchase_price: 22.50, asking_price: 69.99, sold_price: 62, status: 'sold', image_url: '', is_top: false, created_at: ago(18), sold_at: ago(9) },
        { id: uid(), title: 'Cercei aurii eleganți', purchase_price: 14, asking_price: 49.99, sold_price: null, status: 'published', image_url: '', is_top: false, created_at: ago(1), sold_at: null }
      ];
    }

    function loadLocalItems() {
      try {
        const raw = localStorage.getItem(localKey());
        if (raw) return JSON.parse(raw);
        const samples = sampleItems();
        localStorage.setItem(localKey(), JSON.stringify(samples));
        return samples;
      } catch { return sampleItems(); }
    }

    function saveLocalItems() {
      localStorage.setItem(localKey(), JSON.stringify(state.items));
    }

    async function loadItems() {
      if (state.demo) {
        state.items = loadLocalItems();
        renderAll();
        return;
      }
      const { data, error } = await db.from('vinted_items').select('*').order('created_at', { ascending: false });
      if (error) {
        toast(`Nu am putut încărca produsele: ${error.message}`, 'error');
        return;
      }
      state.items = data || [];
      renderAll();
    }

    async function createItem(payload) {
      if (state.demo) {
        state.items.unshift({ id: uid(), ...payload });
        saveLocalItems();
        renderAll();
        return true;
      }
      const { data, error } = await db.from('vinted_items').insert({ ...payload, user_id: state.user.id }).select().single();
      if (error) { toast(error.message, 'error'); return false; }
      state.items.unshift(data);
      renderAll();
      return true;
    }

    async function updateItem(id, changes) {
      if (state.demo) {
        const index = state.items.findIndex(item => item.id === id);
        if (index < 0) return false;
        state.items[index] = { ...state.items[index], ...changes };
        saveLocalItems();
        renderAll();
        return true;
      }
      const { data, error } = await db.from('vinted_items').update(changes).eq('id', id).select().single();
      if (error) { toast(error.message, 'error'); return false; }
      const index = state.items.findIndex(item => item.id === id);
      if (index >= 0) state.items[index] = data;
      renderAll();
      return true;
    }

    async function deleteItem(id) {
      if (state.demo) {
        state.items = state.items.filter(item => item.id !== id);
        saveLocalItems();
        renderAll();
        return true;
      }
      const { error } = await db.from('vinted_items').delete().eq('id', id);
      if (error) { toast(error.message, 'error'); return false; }
      state.items = state.items.filter(item => item.id !== id);
      renderAll();
      return true;
    }

    function getPublished() { return state.items.filter(item => item.status === 'published'); }
    function getSold() { return state.items.filter(item => item.status === 'sold'); }
    function getTop() { return state.items.filter(item => item.status === 'sold' && item.is_top); }
    function profit(item) { return Number(item.sold_price || 0) - Number(item.purchase_price || 0); }
    function totalProfit(items = getSold()) { return items.reduce((sum, item) => sum + profit(item), 0); }
    function totalRevenue(items = getSold()) { return items.reduce((sum, item) => sum + Number(item.sold_price || 0), 0); }
    function totalInvestment(items = getSold()) { return items.reduce((sum, item) => sum + Number(item.purchase_price || 0), 0); }


    function startOfMonth(dateInput = new Date()) {
      const d = new Date(dateInput);
      return new Date(d.getFullYear(), d.getMonth(), 1, 0, 0, 0, 0);
    }

    function endOfMonth(dateInput = new Date()) {
      const d = new Date(dateInput);
      return new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59, 999);
    }

    function inRange(value, start, end) {
      const time = new Date(value).getTime();
      return time >= start.getTime() && time <= end.getTime();
    }

    function currentMonthData() {
      const start = startOfMonth();
      const end = endOfMonth();
      const published = state.items.filter(item => inRange(item.created_at, start, end));
      const sold = getSold().filter(item => inRange(item.sold_at || item.created_at, start, end));
      return { start, end, published, sold };
    }

    function startOfWeek(dateInput) {
      const d = new Date(dateInput);
      d.setHours(0,0,0,0);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      return d;
    }

    function endOfWeek(start) {
      const d = new Date(start);
      d.setDate(d.getDate() + 6);
      d.setHours(23,59,59,999);
      return d;
    }

    function weeklyGroups() {
      const map = new Map();
      const ensureGroup = dateValue => {
        const start = startOfWeek(dateValue);
        const key = start.toISOString().slice(0,10);
        if (!map.has(key)) map.set(key, { start, end: endOfWeek(start), publishedItems: [], soldItems: [], activities: [] });
        return map.get(key);
      };

      state.items.forEach(item => {
        const publishedGroup = ensureGroup(item.created_at);
        publishedGroup.publishedItems.push(item);
        publishedGroup.activities.push({ type: 'published', date: item.created_at, item });

        if (item.status === 'sold') {
          const soldDate = item.sold_at || item.created_at;
          const soldGroup = ensureGroup(soldDate);
          soldGroup.soldItems.push(item);
          soldGroup.activities.push({ type: 'sold', date: soldDate, item });
        }
      });

      ensureGroup(new Date());
      return [...map.values()]
        .map(group => ({ ...group, activities: group.activities.sort((a,b) => new Date(b.date) - new Date(a.date)) }))
        .sort((a,b) => b.start - a.start);
    }

      if (item.image_url) return `<img class="${className}" src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.title)}" loading="lazy" decoding="async" />`;
      if (className === 'thumb') return `<div class="thumb thumb-placeholder">${ICON_PRODUCT}</div>`;
      return `<div class="product-image-placeholder">${ICON_EMPTY}</div>`;

    function setPage(page, options = {}) {
      const { record = true, focusId = null, scrollTarget = null } = options;
      if (!pageInfo[page]) page = 'home';
      const changed = state.page !== page;
      state.page = page;
      state.search = '';
      state.focusItemId = focusId;

      if (record && changed) {
        if (state.pageHistory[state.pageHistory.length - 1] !== page) state.pageHistory.push(page);
        if (state.pageHistory.length > 25) state.pageHistory.shift();
      }

      document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
      document.getElementById(`page-${page}`).classList.add('active');
      document.querySelectorAll('.nav-item[data-page]').forEach(btn => btn.classList.toggle('active', btn.dataset.page === page));
      document.getElementById('pageTitle').textContent = pageInfo[page][0];
      document.getElementById('pageSubtitle').textContent = pageInfo[page][1];
      closeDrawer();

      requestAnimationFrame(() => {
        if (focusId) {
          renderAll();
          document.getElementById(`page-${page}`).classList.add('active');
          document.querySelectorAll('.page').forEach(el => { if (el.id !== `page-${page}`) el.classList.remove('active'); });
          const target = document.getElementById(`item-${focusId}`);
          target?.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setTimeout(() => { state.focusItemId = null; target?.classList.remove('focused-item'); }, 1900);
        } else if (scrollTarget) {
          document.getElementById(scrollTarget)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          window.scrollTo({ top: 0, behavior: 'auto' });
        }
      });
    }

    function navigateBack() {
      if (document.getElementById('modalRoot').innerHTML.trim()) return closeModal();
      if (document.getElementById('sidebar').classList.contains('open')) return closeDrawer();
      if (state.pageHistory.length > 1) {
        state.pageHistory.pop();
        const previous = state.pageHistory[state.pageHistory.length - 1] || 'home';
        setPage(previous, { record: false });
      } else if (state.page !== 'home') {
        setPage('home', { record: false });
      }
    }

    function installSwipeBack() {
      document.addEventListener('touchstart', event => {
        if (event.touches.length !== 1 || event.touches[0].clientX > 34) return;
        state.swipeStart = { x: event.touches[0].clientX, y: event.touches[0].clientY, time: Date.now() };
      }, { passive: true });

      document.addEventListener('touchend', event => {
        if (!state.swipeStart || !event.changedTouches.length) return;
        const end = event.changedTouches[0];
        const dx = end.clientX - state.swipeStart.x;
        const dy = Math.abs(end.clientY - state.swipeStart.y);
        const elapsed = Date.now() - state.swipeStart.time;
        state.swipeStart = null;
        if (dx >= 72 && dy <= 65 && elapsed <= 700) navigateBack();
      }, { passive: true });
    }

    function openDrawer() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('drawerOverlay').classList.remove('hidden');
    }
    function closeDrawer() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('drawerOverlay').classList.add('hidden');
    }

    function openAddModal() {
      state.editingImage = '';
      document.getElementById('modalRoot').innerHTML = `
        <div class="modal-backdrop" data-close-modal>
          <form id="addForm" class="modal" onclick="event.stopPropagation()">
            <div class="modal-head"><h2>Adaugă un produs</h2><button type="button" class="close-btn" data-close-modal aria-label="Închide"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 6 12 12M18 6 6 18"/></svg></button></div>
            <div class="form-grid">
              <div class="field full-span">
                <label>Fotografie</label>
                <label id="imagePicker" class="image-picker">
                  <input id="imageInput" type="file" accept="image/*" />
                  <div class="image-picker-content">${ICON_EMPTY}<div style="font-weight:750;margin-top:8px;">Alege fotografia produsului</div><div style="font-size:11px;margin-top:4px;">Imaginea este comprimată automat</div></div>
                </label>
              </div>
              <div class="field full-span"><label for="itemTitle">Ce produs vinzi?</label><input id="itemTitle" maxlength="80" placeholder="Ex: Brățară placată cu aur" required /></div>
              <div class="field"><label for="purchasePrice">Cât ai plătit?</label><input id="purchasePrice" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0,00" required /></div>
              <div class="field"><label for="askingPrice">Prețul pus pe Vinted</label><input id="askingPrice" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0,00" required /></div>
            </div>
            <div class="modal-actions"><button type="button" class="ghost-btn" data-close-modal>Anulează</button><button class="primary-btn" type="submit">Salvează la Publicate</button></div>
          </form>
        </div>`;
      bindModalClose();
      document.getElementById('imageInput').addEventListener('change', handleImage);
      document.getElementById('addForm').addEventListener('submit', submitAdd);
    }

    function openSellModal(id) {
      const item = state.items.find(x => x.id === id);
      if (!item) return;
      const localNow = new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0,16);
      document.getElementById('modalRoot').innerHTML = `
        <div class="modal-backdrop" data-close-modal>
          <form id="sellForm" class="modal" onclick="event.stopPropagation()">
            <div class="modal-head"><h2>Produs vândut</h2><button type="button" class="close-btn" data-close-modal><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 6 12 12M18 6 6 18"/></svg></button></div>
            <p style="margin:-7px 0 18px;color:var(--muted);font-size:13px;">${escapeHtml(item.title)}</p>
            <div class="form-grid">
              <div class="field"><label>Cât ai plătit?</label><input value="${Number(item.purchase_price).toFixed(2)}" disabled /></div>
              <div class="field"><label for="soldPrice">Cu cât l-ai vândut?</label><input id="soldPrice" type="number" min="0" step="0.01" inputmode="decimal" value="${Number(item.asking_price).toFixed(2)}" required /></div>
              <div class="field full-span"><label for="soldAt">Data și ora vânzării</label><input id="soldAt" type="datetime-local" value="${localNow}" required /></div>
            </div>
            <div id="liveProfit" style="margin-top:2px;padding:13px;border-radius:13px;background:var(--success-soft);color:var(--success);font-weight:800;">Profit: ${money(Number(item.asking_price)-Number(item.purchase_price))}</div>
            <div class="modal-actions"><button type="button" class="ghost-btn" data-close-modal>Anulează</button><button class="primary-btn" type="submit">Salvează vânzarea</button></div>
          </form>
        </div>`;
      bindModalClose();
      const soldInput = document.getElementById('soldPrice');
      soldInput.addEventListener('input', () => document.getElementById('liveProfit').textContent = `Profit: ${money(Number(soldInput.value || 0) - Number(item.purchase_price || 0))}`);
      document.getElementById('sellForm').addEventListener('submit', async event => {
        event.preventDefault();
        const soldPrice = Number(soldInput.value);
        const soldAt = new Date(document.getElementById('soldAt').value).toISOString();
        const ok = await updateItem(id, { status: 'sold', sold_price: soldPrice, sold_at: soldAt });
        if (ok) { closeModal(); setPage('sold'); toast('Produsul a fost mutat la Vândute.', 'success'); }
      });
    }

    function closeModal() { document.getElementById('modalRoot').innerHTML = ''; }
    function bindModalClose() { document.querySelectorAll('[data-close-modal]').forEach(el => el.addEventListener('click', closeModal)); }

    async function handleImage(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) return toast('Alege o imagine validă.', 'error');
      try {
        const dataUrl = await compressImage(file, 1000, .76);
        state.editingImage = dataUrl;
        const picker = document.getElementById('imagePicker');
        picker.classList.add('has-image');
        picker.querySelector('img')?.remove();
        const img = document.createElement('img');
        img.src = dataUrl;
        img.alt = 'Previzualizare';
        picker.appendChild(img);
      } catch { toast('Imaginea nu a putut fi procesată.', 'error'); }
    }

    function compressImage(file, maxSize, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => {
          const img = new Image();
          img.onerror = reject;
          img.onload = () => {
            const ratio = Math.min(1, maxSize / Math.max(img.width, img.height));
            const canvas = document.createElement('canvas');
            canvas.width = Math.max(1, Math.round(img.width * ratio));
            canvas.height = Math.max(1, Math.round(img.height * ratio));
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function submitAdd(event) {
      event.preventDefault();
      if (state.busy) return;
      const title = document.getElementById('itemTitle').value.trim();
      const purchase = Number(document.getElementById('purchasePrice').value);
      const asking = Number(document.getElementById('askingPrice').value);
      if (!title || Number.isNaN(purchase) || Number.isNaN(asking)) return;
      setBusy(true);
      const ok = await createItem({
        title,
        purchase_price: purchase,
        asking_price: asking,
        sold_price: null,
        status: 'published',
        image_url: state.editingImage || '',
        is_top: false,
        created_at: nowIso(),
        sold_at: null
      });
      setBusy(false);
      if (ok) { closeModal(); setPage('published'); toast('Anunțul a fost publicat.', 'success'); }
    }

    async function handleAction(action, id) {
      if (action === 'sell') return openSellModal(id);
      if (action === 'toggle-top') {
        const item = state.items.find(x => x.id === id);
        if (!item) return;
        const ok = await updateItem(id, { is_top: !item.is_top });
        if (ok) toast(item.is_top ? 'Produs scos din TOP.' : 'Produs adăugat în TOP.', 'success');
      }
      if (action === 'delete') {
        const item = state.items.find(x => x.id === id);
        if (!item) return;
        if (!confirm(`Ștergi produsul „${item.title}”?`)) return;
        const ok = await deleteItem(id);
        if (ok) toast('Produs șters.', 'success');
      }
    }

    function bindDynamicEvents() {
      document.querySelectorAll('[data-action]').forEach(btn => btn.onclick = () => handleAction(btn.dataset.action, btn.dataset.id));
      document.querySelectorAll('[data-go]').forEach(btn => {
        const activate = () => {
          setPage(btn.dataset.go, { scrollTarget: btn.dataset.scrollTarget || null });
          if (btn.dataset.toast) toast(btn.dataset.toast);
        };
        btn.onclick = activate;
        btn.onkeydown = event => { if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); activate(); } };
      });
      document.querySelectorAll('[data-open-add]').forEach(btn => {
        btn.onclick = openAddModal;
      });
      document.querySelectorAll('[data-home-action]').forEach(btn => {
        const activate = () => {
          if (btn.dataset.homeAction === 'monthly-profit') setPage('statistics', { scrollTarget: 'monthly-summary' });
          if (btn.dataset.homeAction === 'revenue') openRevenueModal();
        };
        btn.onclick = activate;
        btn.onkeydown = event => { if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); activate(); } };
      });
      document.querySelectorAll('[data-open-item]').forEach(el => {
        const activate = () => {
          const id = el.dataset.openItem;
          const item = state.items.find(entry => entry.id === id);
          if (!item) return;
          closeModal();
          const page = el.dataset.targetPage || (item.status === 'published' ? 'published' : (item.is_top ? 'top' : 'sold'));
          setPage(page, { focusId: id });
        };
        el.onclick = activate;
        el.onkeydown = event => { if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); activate(); } };
      });
      document.querySelectorAll('[data-search]').forEach(input => input.oninput = event => {
        state.search = event.target.value;
        if (state.page === 'published') renderListPage('published', getPublished(), 'published', 'Nu ai anunțuri publicate', 'Apasă pe + și adaugă primul produs.');
        if (state.page === 'sold') renderListPage('sold', getSold(), 'sold', 'Nu ai produse vândute', 'Când marchezi un anunț ca vândut, apare aici.');
        if (state.page === 'top') renderListPage('top', getTop(), 'top', 'Nu ai produse în TOP', 'Din pagina Vândute, apasă „Adaugă în TOP”.');
        bindDynamicEvents();
        const active = document.querySelector(`#page-${state.page} [data-search]`);
        active?.focus();
        active?.setSelectionRange(active.value.length, active.value.length);
      });

      document.querySelectorAll('[data-close-modal]').forEach(el => el.onclick = closeModal);
      document.getElementById('logoutBtn')?.addEventListener('click', logout, { once: true });
      document.getElementById('exportBtn')?.addEventListener('click', exportData, { once: true });
      document.getElementById('resetBtn')?.addEventListener('click', resetData, { once: true });
    }

    function exportData() {
      const blob = new Blob([JSON.stringify({ exported_at: nowIso(), items: state.items }, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `vinted-manager-${new Date().toISOString().slice(0,10)}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    async function resetData() {
      if (!confirm('Sigur ștergi toate produsele și statisticile?')) return;
      if (state.demo) {
        state.items = [];
        saveLocalItems();
        renderAll();
        toast('Toate datele au fost șterse.', 'success');
        return;
      }
      const ids = state.items.map(item => item.id);
      if (!ids.length) return;
      const { error } = await db.from('vinted_items').delete().in('id', ids);
      if (error) return toast(error.message, 'error');
      state.items = [];
      renderAll();
      toast('Toate datele au fost șterse.', 'success');
    }

    async function login(event) {
      event.preventDefault();
      const pin = document.getElementById('loginPin').value.trim();
      if (!/^\d{4,8}$/.test(pin)) return setLoginMessage('PIN-ul trebuie să conțină între 4 și 8 cifre.', true);
      setBusy(true);
      setLoginMessage('');

      if (state.demo) {
        let validPin = false;
        try { validPin = (await sha256(pin)) === DEMO_PIN_HASH; }
        catch { validPin = pin === ['0','7','0','6'].join(''); }
        if (!validPin) {
          setLoginMessage('PIN incorect.', true);
          setBusy(false);
          return;
        }
        localStorage.setItem(sessionKey(), 'active');
        state.user = { id: 'local-user', email: FIXED_EMAIL };
        await enterApp();
        setBusy(false);
        return;
      }

      let { data, error } = await db.auth.signInWithPassword({ email: FIXED_EMAIL, password: supabasePasswordFromPin(pin) });
      if (error && /Invalid login credentials/i.test(error.message)) {
        const signup = await db.auth.signUp({ email: FIXED_EMAIL, password: supabasePasswordFromPin(pin) });
        data = signup.data;
        error = signup.error;
      }
      if (error) {
        setLoginMessage(error.message, true);
        setBusy(false);
        return;
      }
      if (!data.session) {
        setLoginMessage('Contul a fost creat, dar Supabase cere confirmarea emailului. Dezactivează opțiunea Confirm Email.', true);
        setBusy(false);
        return;
      }
      state.user = data.user;
      await enterApp();
      setBusy(false);
    }

    async function logout() {
      if (!state.demo) await db.auth.signOut();
      localStorage.removeItem(sessionKey());
      state.user = null;
      state.items = [];
      document.getElementById('appView').classList.add('hidden');
      document.getElementById('loginView').classList.remove('hidden');
      document.getElementById('loginPin').value = '';
      setLoginMessage('');
    }

    async function enterApp() {
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
      const pill = document.getElementById('syncPill');
      const text = document.getElementById('syncText');
      if (!state.demo) { pill.classList.add('online'); text.textContent = 'Supabase conectat'; }
      else { pill.classList.remove('online'); text.textContent = 'Mod local'; }
      await loadItems();
      state.pageHistory = ['home'];
      setPage('home', { record: false });
    }

    async function boot() {
      document.getElementById('loginModeNote').innerHTML = state.demo
        ? '<strong>Mod demonstrativ:</strong> aplicația funcționează acum cu date salvate pe dispozitiv. După completarea cheilor Supabase în cod, se sincronizează online.'
        : '<strong>Supabase activ:</strong> introdu PIN-ul contului pentru conectare.';

      document.getElementById('loginForm').addEventListener('submit', login);
      document.getElementById('addFab').addEventListener('click', openAddModal);
      document.getElementById('menuBtn').addEventListener('click', openDrawer);
      document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
      document.querySelectorAll('.nav-item[data-page]').forEach(btn => btn.addEventListener('click', () => setPage(btn.dataset.page)));
      installSwipeBack();

      if (state.demo) {
        if (localStorage.getItem(sessionKey()) === 'active') {
          state.user = { id: 'local-user', email: FIXED_EMAIL };
          await enterApp();
        }
        return;
      }

      const { data } = await db.auth.getSession();
      if (data.session) {
        state.user = data.session.user;
        await enterApp();
      }
    }

    boot();
  </script>
</body>
